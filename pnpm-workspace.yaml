allowBuilds:
  sharp: true
  simple-git-hooks: false
  unrs-resolver: false
overrides:
  # Pull gray-matter's YAML parser up to the 3.x security backport
  # (quadratic-complexity DoS in merge keys, GHSA fixed in 3.15.0).
  js-yaml@3: 3.15.0
  # next bundles postcss 8.4.31 (both 16.2.9 and 16.2.10), which is vulnerable
  # to GHSA-qx2v-qp2m-jg93 (patched >=8.5.10). Force it up to the patched line;
  # postcss is API-stable across 8.x minors. We already use 8.5.x directly.
  postcss: '>=8.5.10'
  # semantic-release's GitHub-Actions toolkit chain pulls two vulnerable undici
  # copies (dev/CI-only, never shipped). @actions/core (latest) still resolves
  # them, so no plugin upgrade clears these — pin each within its own major to
  # the patched boundary (6.27.0 / 7.28.0), a patch bump with no API break.
  undici@6: 6.27.0
  undici@7: 7.28.0
minimumReleaseAgeExclude:
  - '@next/env@16.2.9'
  - '@next/eslint-plugin-next@16.2.9'
  - '@next/swc-darwin-arm64@16.2.9'
  - '@next/swc-darwin-x64@16.2.9'
  - '@next/swc-linux-arm64-gnu@16.2.9'
  - '@next/swc-linux-arm64-musl@16.2.9'
  - '@next/swc-linux-x64-gnu@16.2.9'
  - '@next/swc-linux-x64-musl@16.2.9'
  - '@next/swc-win32-arm64-msvc@16.2.9'
  - '@next/swc-win32-x64-msvc@16.2.9'
  - eslint-config-next@16.2.9
  - next@16.2.9
  - semantic-release@25.0.5
  - '@next/bundle-analyzer@16.2.9'
